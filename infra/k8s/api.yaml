apiVersion: apps/v1
kind: Deployment
metadata:
  name: vsp-api
  namespace: vsp
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: vsp-api }
  template:
    metadata:
      labels: { app: vsp-api }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/your-org/vsp-api:latest
          imagePullPolicy: Always
          ports:
            - { name: http, containerPort: 4000 }
            - { name: ws,   containerPort: 4001 }
          envFrom:
            - secretRef: { name: vsp-secrets }
            - configMapRef: { name: vsp-config }
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: 1,    memory: 1Gi }
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ['ALL'] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: vsp-api
  namespace: vsp
spec:
  selector: { app: vsp-api }
  ports:
    - { name: http, port: 4000, targetPort: 4000 }
    - { name: ws,   port: 4001, targetPort: 4001 }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vsp-api
  namespace: vsp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vsp-api
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
