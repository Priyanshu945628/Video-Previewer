name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: vsp, POSTGRES_PASSWORD: vsp, POSTGRES_DB: vsp }
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
    env:
      DATABASE_URL: postgresql://vsp:vsp@localhost:5432/vsp
      DATABASE_DIRECT_URL: postgresql://vsp:vsp@localhost:5432/vsp
      REDIS_URL: redis://localhost:6379
      VSP_INTEGRATION: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vsp/db generate
      - run: pnpm --filter @vsp/db migrate:deploy

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: docker compose -f infra/docker/docker-compose.yml up -d
      - run: pnpm --filter @vsp/e2e exec playwright install --with-deps chromium webkit
      - run: pnpm test:e2e

  security:
    name: Security scans
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
